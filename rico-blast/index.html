<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="RICO BLAST">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="application-name" content="RICO BLAST">
  <meta name="theme-color" content="#0d0d1a">
  <title>RICO BLAST</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="screen-title" class="screen active"></div>

  <div id="screen-game" class="screen">
    <div id="hud-bar">
      <div id="hud-score-block">
        <span class="hud-label">SCORE</span>
        <b id="hud-score">0</b>
        <div id="hud-skill-progress" aria-label="SKILL 0 / 30">
          <span id="hud-skill-progress-fill"></span>
        </div>
      </div>
      <span id="hud-timer">0:00</span>
      <button id="btn-pause" class="hud-button" type="button">STOP</button>
    </div>
    <div id="game-stage">
      <canvas id="game-canvas"></canvas>
      <div id="combo-banner" aria-live="polite">
        <b id="combo-count">0</b>
        <span>COMBO</span>
      </div>

      <div id="screen-skill" class="game-panel">
        <div class="overlay-panel skill-panel">
          <p class="overlay-kicker">SKILL READY</p>
          <h2 class="overlay-title">CHOOSE A SKILL</h2>
          <div id="skill-cards"></div>
          <div id="ball-picker"></div>
          <div id="skill-reroll-row"></div>
        </div>
      </div>

      <div id="screen-upgrade" class="game-panel">
        <div class="overlay-panel upgrade-panel">
          <div id="upgrade-list"></div>
          <button id="btn-continue">CONTINUE</button>
        </div>
      </div>
    </div>
    <div id="screen-gameover" class="game-panel">
      <div id="gameover-card"></div>
    </div>
    <div id="paddle-hp">
      <span id="hp-token-display">
        <span>TOKEN</span>
        <b id="hp-token-count">0</b>
      </span>
      <span id="token-gain-text">+0 TOKEN</span>
      <div id="paddle-hp-meter">
        <div class="hp-meter-head">
          <span class="hp-label">PADDLE HP</span>
          <span id="paddle-hp-text">20 / 20</span>
        </div>
        <div id="paddle-hp-track">
          <div id="paddle-hp-fill"></div>
        </div>
      </div>
    </div>
    <div id="slot-bar">
      <div class="slot" id="slot-0"></div>
      <div class="slot" id="slot-1"></div>
      <div class="slot" id="slot-2"></div>
      <div class="slot" id="slot-3"></div>
    </div>
    <div id="paddle-status">
      <div class="slot" id="slot-paddle"></div>
      <div class="slot" id="slot-bumper"></div>
    </div>
  </div>

  <div id="toast-root" aria-live="polite"></div>
  <div id="confirm-root" aria-live="polite"></div>

  <script src="js/skills.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ball.js"></script>
  <script src="js/block.js"></script>
  <script src="js/paddle.js"></script>
  <script src="js/bumper.js"></script>
  <script src="js/tokens.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
  <script src="js/pwa.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
